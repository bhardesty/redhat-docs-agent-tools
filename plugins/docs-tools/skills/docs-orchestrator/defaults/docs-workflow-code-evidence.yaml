workflow:
  name: docs-workflow
  description: Code-evidence-grounded documentation workflow. Requires a source code repository. Adds scope-req-audit and code-evidence steps to classify requirements by implementation status and ground documentation in actual source code.

  requires:
    - has_source_repo

  # All step outputs go to: .claude/docs/<ticket>/<step-name>/
  # Each step reads its inputs from upstream step folders by convention.
  steps:
    - name: requirements
      skill: docs-workflow-requirements
      description: Analyze documentation requirements

    - name: scope-req-audit
      skill: docs-workflow-scope-req-audit
      description: Classify requirements by code evidence status
      when: has_source_repo
      inputs: [requirements]

    - name: planning
      skill: docs-workflow-planning
      description: Create documentation plan
      inputs: [requirements, scope-req-audit]

    - name: code-evidence
      skill: docs-workflow-code-evidence
      description: Retrieve code evidence from source repository
      when: has_source_repo
      inputs: [planning]

    - name: prepare-branch
      skill: docs-workflow-prepare-branch
      description: Create a fresh branch from latest upstream default branch
      inputs: [planning]

    - name: writing
      skill: docs-workflow-writing
      description: Write documentation
      inputs: [planning, prepare-branch, code-evidence]

    - name: technical-review
      skill: docs-workflow-tech-review
      description: Technical accuracy review
      inputs: [writing]

    - name: style-review
      skill: docs-workflow-style-review
      description: Style guide compliance review
      inputs: [writing, technical-review]

    - name: commit
      skill: docs-workflow-commit
      description: Commit and push documentation changes
      inputs: [writing, style-review, technical-review]

    - name: create-mr
      skill: docs-workflow-create-mr
      description: Create merge request or pull request
      inputs: [commit]

    - name: create-jira
      skill: docs-workflow-create-jira
      description: Create linked JIRA ticket
      when: create_jira_project
      inputs: [planning]
